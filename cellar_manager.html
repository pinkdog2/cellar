<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Cellar — Collection Manager</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2C2C2C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Cellar">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F7F5EF;--cream:#FAF3E0;--wine:#722F37;--bourbon:#D4A017;--charcoal:#2C2C2C;--sage:#5a7247;--light-wine:#f5e6e8;--light-bourbon:#faf0d4;--border:#eee;--text:#2C2C2C;--muted:#888;--danger:#c62828}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
input,select,textarea,button{font-family:inherit}
.inp{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:14px;box-sizing:border-box}
.inp:focus{outline:none;border-color:var(--bourbon)}
textarea.inp{resize:vertical}
.lbl{font-size:12px;font-weight:600;color:#555;margin-bottom:4px;display:block}
.btn{padding:8px 22px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--wine);color:#fff}
.btn-s{background:#fff;border:1px solid #ddd;color:var(--text)}
.btn-g{background:var(--bourbon);color:#fff}
.btn:hover{opacity:.9}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}

#sidebar{width:220px;background:linear-gradient(180deg,var(--charcoal),#1a1a1a);color:#fff;display:flex;flex-direction:column;flex-shrink:0;transition:width .2s;overflow:hidden}
#sidebar.collapsed{width:56px}
#sidebar .logo{padding:20px 18px;border-bottom:1px solid #444;display:flex;align-items:center;gap:10px;cursor:pointer}
#sidebar.collapsed .logo{padding:20px 12px}
#sidebar .logo span.title{font-family:Georgia,serif;font-size:16px;font-weight:600;white-space:nowrap}
#sidebar.collapsed .logo span.title,#sidebar.collapsed .nav-label,#sidebar.collapsed .sidebar-btns{display:none}
#sidebar nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;color:#aaa;transition:all .15s;border-left:3px solid transparent}
.nav-item.active{background:rgba(255,255,255,.1);border-left-color:var(--bourbon);color:#fff}
.nav-item:hover{color:#fff}
.sidebar-btns{padding:12px 18px;border-top:1px solid #444}
.sidebar-btns button{width:100%;padding:10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:6px}

#main{flex:1;overflow:auto}
#header{padding:14px 28px;border-bottom:1px solid #e8e4da;background:#fff;display:flex;justify-content:space-between;align-items:center;gap:16px}
#header h1{font-family:Georgia,serif;font-size:22px;white-space:nowrap;margin:0}
#content{padding:24px 28px}

.search-wrap{position:relative;flex:1;max-width:420px}
.search-wrap input{width:100%;padding:8px 10px 8px 34px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#FAFAF5;box-sizing:border-box}
.search-wrap input:focus{outline:none;border-color:var(--bourbon)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:999;max-height:400px;overflow:auto;display:none}
.search-results.open{display:block}
.search-result{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f8f8f5;display:flex;justify-content:space-between;align-items:center}
.search-result:hover{background:var(--cream)}

.stat-card{background:var(--cream);border-radius:8px;padding:14px 18px;min-width:140px;flex:1}
.stat-card .label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
.stat-card .value{font-size:22px;font-weight:600;font-family:Georgia,serif;color:var(--text)}

.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px}
.card:hover{border-color:var(--bourbon)}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-w{background:var(--light-wine);color:var(--wine)}
.badge-b{background:var(--light-bourbon);color:#8B6914}

table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);font-weight:600;font-size:12px;cursor:pointer;user-select:none;white-space:nowrap;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
td{padding:8px 10px;border-bottom:1px solid #f5f5f5}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:12px;max-width:700px;width:100%;max-height:90vh;overflow:auto;padding:24px 28px}
.modal.wide{max-width:900px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h2{font-family:Georgia,serif;font-size:20px;margin:0}

fieldset{border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
legend{font-weight:600;font-size:13px;padding:0 6px}

.cap-bar{flex:1;background:#eee;border-radius:20px;height:8px;overflow:hidden}
.cap-fill{height:100%;border-radius:20px;transition:width .3s}

.drop-zone{border:2px dashed #ccc;border-radius:12px;padding:40px;text-align:center;cursor:pointer;background:#FAFAF5}

.status-pill{font-size:11px;padding:2px 8px;border-radius:10px}

.icon{display:inline-flex;vertical-align:middle}
svg{vertical-align:middle}

@media(max-width:768px){
  #sidebar{width:56px}
  #sidebar .nav-label,#sidebar .sidebar-btns,#sidebar .logo span.title{display:none}
  .g2{grid-template-columns:1fr}
  #header{flex-wrap:wrap}
}
</style>
</head>
<body>
<div id="sidebar">
  <div class="logo" onclick="toggleSidebar()">
    <span style="font-size:22px">&#129347;</span>
    <span class="title">The Cellar</span>
  </div>
  <nav id="nav"></nav>
  <div class="sidebar-btns">
    <button class="btn btn-p" onclick="showAddModal()">+ Add bottle</button>
    <button class="btn btn-s" onclick="showImportModal()" style="border-color:#555;color:#ccc;background:transparent">&#8593; Import</button>
  </div>
</div>
<div id="main">
  <div id="header">
    <h1 id="page-title">Dashboard</h1>
    <div class="search-wrap">
      <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input id="global-search" placeholder="Search entire collection..." oninput="onGlobalSearch()" onfocus="onGlobalSearch()" onblur="setTimeout(()=>document.getElementById('g-results').classList.remove('open'),200)">
      <div id="g-results" class="search-results"></div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button class="btn btn-p" onclick="showAddModal()">+ Add</button>
      <button class="btn btn-s" onclick="showImportModal()">&#8593; Import</button>
    </div>
  </div>
  <div id="content"></div>
</div>
<div id="modal-container"></div>

<script>
const WINE_COLORS=["Red","White","Rosé","Sparkling","Dessert","Fortified"];
const BOURBON_TYPES=["Bourbon","Rye","Scotch","Irish","Japanese","Other Whiskey"];
const WINE_STATUSES=["In Collection","Consumed","Gifted","Sold"];
const BOURBON_STATUSES=["In Collection","Opened","Consumed","Gifted","Sold"];
const FILL_LEVELS=["Full (Sealed)","75%+","50%+","25%+","Empty (Display Only)"];
const BOTTLE_SIZES_WINE=["375ml","750ml","1L","1.5L (Magnum)","3L","Other"];
const BOTTLE_SIZES_BOURBON=["375ml","750ml","1L","1.75L","Other"];
const STORAGE_TYPES=[
  {id:"fridge",label:"Wine fridge (slotted)",rows:6,cols:4,shape:"horizontal"},
  {id:"shelf",label:"Open shelving / bar display",rows:3,cols:8,shape:"square"},
  {id:"rack",label:"Cellar rack (grid-style)",rows:8,cols:8,shape:"diamond"},
  {id:"cabinet",label:"Liquor cabinet / closed storage",rows:4,cols:5,shape:"square"}
];
const VALUE_BUCKETS=[{l:"$0-25",n:0,x:25},{l:"$25-50",n:25,x:50},{l:"$50-100",n:50,x:100},{l:"$100-250",n:100,x:250},{l:"$250-500",n:250,x:500},{l:"$500+",n:500,x:Infinity}];

const HEADER_MAP_WINE={name:["name","wine","label"],producer:["winery","producer","maker"],vintage:["year","vintage","yr"],varietal:["grape","varietal","variety","blend"],region:["region","appellation","ava"],country:["country","origin"],color:["color","type","style"],quantity:["qty","quantity","count","bottles"],bottleSize:["size","bottle size","format"],purchasePrice:["price","cost","purchase price","paid"],currentValue:["value","est value","current value","market value"],purchaseDate:["purchased","purchase date","date bought","date"],purchaseSource:["source","retailer","where","store"],storageLocation:["location","storage","rack","slot","bin"],drinkWindow:["drink by","window","drink window","peak"],rating:["rating","score","points"],tastingNotes:["notes","tasting notes","comments"],tags:["tags","categories","labels"],status:["status"]};
const HEADER_MAP_BOURBON={name:["name","bourbon","whiskey","label"],distillery:["distillery","distiller","producer","maker"],type:["type","category","spirit type"],ageStatement:["age","age statement","years"],proof:["proof","abv","alcohol"],batchBarrel:["batch","barrel","barrel #","batch #"],quantity:["qty","quantity","count","bottles"],bottleSize:["size","bottle size","format"],purchasePrice:["price","cost","purchase price","paid"],currentValue:["value","est value","current value","market value"],purchaseDate:["purchased","purchase date","date bought","date"],purchaseSource:["source","retailer","where","store"],storageLocation:["location","storage","rack","shelf"],fillLevel:["fill","fill level","level","remaining"],rating:["rating","score","points"],tastingNotes:["notes","tasting notes","comments"],tags:["tags","categories","labels"],status:["status"]};

let data=loadLS("cellar_collection_v1",[]);
let settings=loadLS("cellar_settings_v1",{owner:"",currency:"$",tags:[],apiKey:""});
let storageLocations=loadLS("cellar_storage_v1",[]);
let currentView="dashboard";
let charts={};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function cur(v){const s=settings.currency||"$";if(v==null||v==="")return"-";return s+Number(v).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}
function loadLS(k,fb){try{return JSON.parse(localStorage.getItem(k))||fb}catch{return fb}}
function save(){localStorage.setItem("cellar_collection_v1",JSON.stringify(data));localStorage.setItem("cellar_settings_v1",JSON.stringify(settings));localStorage.setItem("cellar_storage_v1",JSON.stringify(storageLocations))}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function fuzzyMap(headers,map){const r={};headers.forEach((h,i)=>{const hl=h.toLowerCase().trim();for(const[f,a]of Object.entries(map)){if(a.some(x=>hl===x||hl.includes(x))){r[i]=f;break;}}});return r}
function emptyWine(){return{id:uid(),category:"wine",name:"",producer:"",vintage:"",varietal:"",region:"",country:"",color:"Red",quantity:1,bottleSize:"750ml",purchasePrice:"",currentValue:"",purchaseDate:"",purchaseSource:"",storageLocation:"",drinkWindow:"",rating:"",tastingNotes:"",tags:"",status:"In Collection",dateConsumed:""}}
function emptyBourbon(){return{id:uid(),category:"bourbon",name:"",distillery:"",type:"Bourbon",ageStatement:"",proof:"",batchBarrel:"",quantity:1,bottleSize:"750ml",purchasePrice:"",currentValue:"",purchaseDate:"",purchaseSource:"",storageLocation:"",fillLevel:"Full (Sealed)",rating:"",tastingNotes:"",tags:"",status:"In Collection",dateConsumed:""}}
function inCol(d){return!["Consumed","Gifted","Sold"].includes(d.status)}

function toggleSidebar(){document.getElementById("sidebar").classList.toggle("collapsed")}

// NAV
const navItems=[{id:"dashboard",label:"Dashboard"},{id:"collection",label:"Collection"},{id:"storage",label:"Storage Map"},{id:"reports",label:"Reports & Export"},{id:"settings",label:"Settings"}];
function renderNav(){
  const nav=document.getElementById("nav");
  nav.innerHTML=navItems.map(n=>`<div class="nav-item${currentView===n.id?" active":""}" onclick="navigate('${n.id}')"><span class="nav-label">${n.label}</span></div>`).join("");
}
function navigate(v){currentView=v;document.getElementById("page-title").textContent={dashboard:"Dashboard",collection:"Collection",storage:"Storage Map",reports:"Reports & Export",settings:"Settings"}[v];renderNav();renderContent()}

// GLOBAL SEARCH
function onGlobalSearch(){
  const q=document.getElementById("global-search").value.toLowerCase();
  const box=document.getElementById("g-results");
  if(q.length<2){box.classList.remove("open");return}
  const matches=data.filter(d=>Object.values(d).join(" ").toLowerCase().includes(q)).slice(0,12);
  if(!matches.length){box.innerHTML=`<div style="padding:20px;text-align:center;color:#aaa;font-size:13px">No bottles match "${esc(q)}"</div>`;box.classList.add("open");return}
  box.innerHTML=`<div style="padding:8px 12px;font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #f0f0f0">${matches.length} result${matches.length!==1?"s":""}</div>`+
    matches.map(d=>`<div class="search-result" onmousedown="editBottle('${d.id}');document.getElementById('global-search').value='';document.getElementById('g-results').classList.remove('open')">
      <div style="min-width:0"><div style="display:flex;align-items:center;gap:6px"><span class="badge ${d.category==="wine"?"badge-w":"badge-b"}">${d.category==="wine"?"W":"B"}</span><span style="font-weight:600;font-size:14px">${esc(d.name)}</span></div>
      <div style="font-size:12px;color:#888;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(d.producer||d.distillery||"")}${d.vintage?" - "+d.vintage:""}${d.varietal?" - "+esc(d.varietal):""}${d.storageLocation?" | "+esc(d.storageLocation):""}</div></div>
      <div style="text-align:right;flex-shrink:0;margin-left:12px">${d.currentValue?`<div style="font-weight:600;font-size:13px">${cur(d.currentValue)}</div>`:""}
      <div style="font-size:11px;color:${d.status==="In Collection"?"#2e7d32":"#888"}">${esc(d.status)}</div></div></div>`).join("");
  box.classList.add("open");
}

// RENDER
function renderContent(){
  const c=document.getElementById("content");
  if(currentView==="dashboard")renderDashboard(c);
  else if(currentView==="collection")renderCollection(c);
  else if(currentView==="storage")renderStorage(c);
  else if(currentView==="reports")renderReports(c);
  else if(currentView==="settings")renderSettings(c);
}

// DASHBOARD
function renderDashboard(c){
  const ic=data.filter(inCol);
  const totalVal=ic.reduce((s,d)=>s+(Number(d.currentValue)||0)*(Number(d.quantity)||1),0);
  const totalCost=ic.reduce((s,d)=>s+(Number(d.purchasePrice)||0)*(Number(d.quantity)||1),0);
  const totalBot=ic.reduce((s,d)=>s+(Number(d.quantity)||0),0);
  const wB=ic.filter(d=>d.category==="wine").reduce((s,d)=>s+(Number(d.quantity)||0),0);
  const bB=ic.filter(d=>d.category==="bourbon").reduce((s,d)=>s+(Number(d.quantity)||0),0);
  const avg=totalBot?totalVal/totalBot:0;const gain=totalVal-totalCost;
  if(!data.length){c.innerHTML=`<div style="text-align:center;padding:60px"><div style="font-size:48px;margin-bottom:16px">&#129347;</div><h2 style="font-family:Georgia,serif;margin-bottom:8px">Your cellar is empty</h2><p style="color:#888">Add your first bottle or import from a spreadsheet.</p></div>`;return}
  const vb=VALUE_BUCKETS.map(b=>({l:b.l,count:ic.filter(d=>{const v=Number(d.currentValue)||Number(d.purchasePrice)||0;return v>=b.n&&v<b.x}).reduce((s,d)=>s+(Number(d.quantity)||0),0)}));
  const top10=ic.filter(d=>Number(d.currentValue)>0).sort((a,b)=>(Number(b.currentValue)||0)-(Number(a.currentValue)||0)).slice(0,10);
  c.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px">
      <div class="stat-card"><div class="label">Total bottles</div><div class="value">${totalBot}</div></div>
      <div class="stat-card" style="background:var(--light-wine)"><div class="label">Wine</div><div class="value">${wB}</div></div>
      <div class="stat-card" style="background:var(--light-bourbon)"><div class="label">Bourbon</div><div class="value">${bB}</div></div>
      <div class="stat-card"><div class="label">Collection value</div><div class="value">${cur(totalVal)}</div></div>
      <div class="stat-card"><div class="label">Avg. value</div><div class="value">${cur(avg)}</div></div>
      <div class="stat-card" style="background:${gain>=0?"#e8f5e9":"#fce8e8"}"><div class="label">Gain / Loss</div><div class="value">${(gain>=0?"+":"")+cur(gain)}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:280px 1fr;gap:20px;margin-bottom:24px">
      <div class="card"><h3 style="font-size:14px;color:#555;margin-bottom:12px">Breakdown</h3><div style="position:relative;height:200px"><canvas id="ch-donut"></canvas></div>
        <div style="display:flex;gap:12px;justify-content:center;margin-top:12px;font-size:12px"><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--wine);display:inline-block"></span> Wine</span><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--bourbon);display:inline-block"></span> Bourbon</span></div>
      </div>
      <div class="card"><h3 style="font-size:14px;color:#555;margin-bottom:12px">Value distribution</h3><div style="position:relative;height:220px"><canvas id="ch-val"></canvas></div></div>
    </div>
    ${top10.length?`<div class="card"><h3 style="font-size:14px;color:#555;margin-bottom:12px">Top ${top10.length} most valuable</h3><div style="position:relative;height:${Math.max(200,top10.length*36+60)}px"><canvas id="ch-top"></canvas></div></div>`:""}`;
  Object.values(charts).forEach(ch=>{try{ch.destroy()}catch{}});charts={};
  setTimeout(()=>{
    const d1=document.getElementById("ch-donut");if(d1)charts.d=new Chart(d1,{type:"doughnut",data:{labels:["Wine","Bourbon"],datasets:[{data:[wB,bB],backgroundColor:["#722F37","#D4A017"],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:"65%",plugins:{legend:{display:false}}}});
    const d2=document.getElementById("ch-val");if(d2)charts.v=new Chart(d2,{type:"bar",data:{labels:vb.map(b=>b.l),datasets:[{data:vb.map(b=>b.count),backgroundColor:"#D4A017",borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}},x:{grid:{display:false}}}}});
    const d3=document.getElementById("ch-top");if(d3&&top10.length)charts.t=new Chart(d3,{type:"bar",data:{labels:top10.map(d=>d.name.length>25?d.name.slice(0,25)+"...":d.name),datasets:[{data:top10.map(d=>Number(d.currentValue)),backgroundColor:"#722F37",borderRadius:4}]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{callback:v=>(settings.currency||"$")+v}},y:{grid:{display:false}}}}});
  },50);
}

// COLLECTION TABLE
let colSearch="",colCat="all",colStat="all",sortCol="name",sortDir=1;
function renderCollection(c){
  let d=[...data];
  if(colCat!=="all")d=d.filter(x=>x.category===colCat);
  if(colStat!=="all")d=d.filter(x=>x.status===colStat);
  if(colSearch){const q=colSearch.toLowerCase();d=d.filter(x=>Object.values(x).join(" ").toLowerCase().includes(q))}
  d.sort((a,b)=>{let va=a[sortCol]||"",vb=b[sortCol]||"";if(["quantity","purchasePrice","currentValue","rating","vintage","proof"].includes(sortCol)){va=Number(va)||0;vb=Number(vb)||0}else{va=String(va).toLowerCase();vb=String(vb).toLowerCase()}return va<vb?-sortDir:va>vb?sortDir:0});
  const allStat=[...new Set([...WINE_STATUSES,...BOURBON_STATUSES])];
  c.innerHTML=`
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
      <div style="position:relative;flex:1;min-width:200px"><span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input class="inp" style="padding-left:34px" value="${esc(colSearch)}" oninput="colSearch=this.value;renderContent()" placeholder="Search collection..."></div>
      <select class="inp" style="width:auto" onchange="colCat=this.value;renderContent()"><option value="all"${colCat==="all"?" selected":""}>All types</option><option value="wine"${colCat==="wine"?" selected":""}>Wine</option><option value="bourbon"${colCat==="bourbon"?" selected":""}>Bourbon</option></select>
      <select class="inp" style="width:auto" onchange="colStat=this.value;renderContent()"><option value="all"${colStat==="all"?" selected":""}>All statuses</option>${allStat.map(s=>`<option value="${s}"${colStat===s?" selected":""}>${s}</option>`).join("")}</select>
    </div>
    <div style="overflow:auto;border:1px solid var(--border);border-radius:10px">
      <table style="min-width:800px"><thead><tr style="background:var(--cream)">
        <th onclick="toggleSort('category')">Type</th><th onclick="toggleSort('name')">Name</th><th onclick="toggleSort('vintage')">Yr</th><th onclick="toggleSort('varietal')">Detail</th><th onclick="toggleSort('quantity')">Qty</th><th onclick="toggleSort('purchasePrice')">Cost</th><th onclick="toggleSort('currentValue')">Value</th><th onclick="toggleSort('rating')">Rating</th><th onclick="toggleSort('status')">Status</th><th style="cursor:default">Actions</th>
      </tr></thead><tbody>

      d.map(b=>`<tr>

        <td style="color:#555">${b.category==="wine"?esc((b.varietal||"")+(b.color?" ("+b.color+")":""))  :esc((b.type||"")+(b.ageStatement?" / "+b.ageStatement:""))}</td>
        <td style="text-align:center">${b.quantity}</td>
        <td>${b.purchasePrice?cur(b.purchasePrice):"-"}</td>
        <td style="font-weight:600">${b.currentValue?cur(b.currentValue):"-"}</td>
        <td style="text-align:center">${b.rating||"-"}</td>

          <button onclick="editBottle('${b.id}')" style="background:none;border:none;cursor:pointer;padding:4px;color:#888" title="Edit">&#9998;</button>

        </td></tr>`).join("")}
      </tbody></table>
    </div>
    <div style="margin-top:8px;font-size:12px;color:#aaa">${d.length} of ${data.length} entries</div>`;
}
function toggleSort(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1}renderContent()}
function editBottle(id){const b=data.find(d=>d.id===id);if(b)showEntryModal(b)}
function dupBottle(id){const b=data.find(d=>d.id===id);if(b){data.push({...b,id:uid()});save();renderContent()}}
function delBottle(id){if(confirm("Remove this bottle?")){data=data.filter(d=>d.id!==id);storageLocations.forEach(l=>{Object.keys(l.slots||{}).forEach(k=>{if(l.slots[k]===id)delete l.slots[k]})});save();renderContent()}}

// STORAGE
let storageView="list",activeStorageId=null,storageViewMode="schematic";
function renderStorage(c){
  if(storageView==="detail"){const loc=storageLocations.find(l=>l.id===activeStorageId);if(!loc){storageView="list";renderStorage(c);return}renderStorageDetail(c,loc);return}
  const cards=storageLocations.map(l=>{const f=Object.keys(l.slots||{}).length;const t=l.rows*l.cols;const p=t?Math.round(f/t*100):0;
    return`<div class="card" style="cursor:pointer" onclick="activeStorageId='${l.id}';storageView='detail';storageViewMode='schematic';renderContent()">
      ${l.photo?`<div style="height:100px;overflow:hidden;border-radius:6px;margin-bottom:10px;background:#f5f5f5"><img src="${l.photo}" style="width:100%;height:100%;object-fit:cover"></div>`:""}
      <h3 style="margin:0 0 4px;font-family:Georgia,serif;font-size:15px">${esc(l.name)}</h3>
      <p style="font-size:12px;color:#888">${STORAGE_TYPES.find(t=>t.id===l.storageType)?.label||""}</p>
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px"><div class="cap-bar"><div class="cap-fill" style="background:${p>80?"var(--danger)":"var(--sage)"};width:${p}%"></div></div><span style="font-size:11px;color:#888">${f}/${t}</span></div></div>`}).join("");
  c.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <p style="font-size:13px;color:#888">${storageLocations.length} location${storageLocations.length!==1?"s":""}</p>
    <button class="btn btn-p" onclick="showAddStorageModal()">+ Add location</button></div>
    ${!storageLocations.length?`<div class="card" style="text-align:center;padding:60px"><h3 style="font-family:Georgia,serif;margin-top:12px">No storage locations yet</h3><p style="color:#888;font-size:13px">Add your wine fridge, cellar rack, bar shelf, or cabinet.</p></div>`:""}
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">${cards}</div>`;
}
function renderStorageDetail(c,loc){
  const slots=loc.slots||{};const filled=Object.keys(slots).length;const total=loc.rows*loc.cols;
  const typeInfo=STORAGE_TYPES.find(t=>t.id===loc.storageType)||STORAGE_TYPES[0];
  const isDiamond=typeInfo.shape==="diamond",isHoriz=typeInfo.shape==="horizontal";
  const cellW=isDiamond?40:isHoriz?120:56,cellH=isDiamond?40:isHoriz?32:56,gap=isDiamond?4:6;
  const svgW=loc.cols*(cellW+gap)+gap+(isDiamond?cellW/2:0)+40;
  const svgH=loc.rows*(cellH+gap)+gap+60;
  let svgContent=`<rect x="10" y="10" width="${svgW-20}" height="${svgH-20}" rx="8" fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="${loc.storageType==="cabinet"?"0":"4 2"}"/>`;
  if(loc.storageType==="cabinet")svgContent+=`<rect x="10" y="10" width="${svgW-20}" height="${svgH-20}" rx="6" fill="none" stroke="#8B7355" stroke-width="3"/>`;
  for(let r=0;r<loc.rows;r++){for(let col=0;col<loc.cols;col++){
    const key=`r${r}-c${col}`;const bid=slots[key];const bottle=bid?data.find(d=>d.id===bid):null;
    const ox=20+col*(cellW+gap)+(isDiamond&&r%2?cellW/2+gap/2:0);const oy=30+r*(cellH+gap);
    const fill=bottle?bottle.category==="wine"?"#722F37":"#D4A017":"#fff";const stroke=bottle?"none":"#ccc";
    if(isDiamond){const cx=ox+cellW/2,cy=oy+cellH/2,s=cellW/2-2;
      svgContent+=`<g onclick="handleSlotClick('${loc.id}','${key}')" style="cursor:pointer"><polygon points="${cx},${cy-s} ${cx+s},${cy} ${cx},${cy+s} ${cx-s},${cy}" fill="${fill}" stroke="${stroke}" stroke-width="1" opacity="${bottle?.85:1}"/>${bottle?`<text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="8" font-weight="600">${esc(bottle.name.slice(0,3))}</text>`:""}</g>`;
    }else{
      svgContent+=`<g onclick="handleSlotClick('${loc.id}','${key}')" style="cursor:pointer"><rect x="${ox}" y="${oy}" width="${cellW}" height="${cellH}" rx="${isHoriz?cellH/2:4}" fill="${fill}" stroke="${stroke}" stroke-width="1" opacity="${bottle?.85:1}"/>${bottle?`<text x="${ox+cellW/2}" y="${oy+cellH/2+1}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="${isHoriz?10:9}" font-weight="500">${esc(bottle.name.length>(isHoriz?14:5)?bottle.name.slice(0,isHoriz?14:5)+"...":bottle.name)}</text>`:`<text x="${ox+cellW/2}" y="${oy+cellH/2+1}" text-anchor="middle" dominant-baseline="middle" fill="#ccc" font-size="9">${r+1},${col+1}</text>`}</g>`;
    }
  }}
  const viewBtns=loc.photo?`<div style="display:flex;gap:2px;background:#f5f5f5;border-radius:6px;padding:2px">${[["schematic","Grid"],["photo","Photo"],["split","Split"]].map(([m,l])=>`<button onclick="storageViewMode='${m}';renderContent()" style="padding:4px 10px;border-radius:4px;border:none;background:${storageViewMode===m?"#fff":"transparent"};cursor:pointer;font-size:12px;font-weight:${storageViewMode===m?600:400};box-shadow:${storageViewMode===m?"0 1px 2px rgba(0,0,0,.1)":"none"}">${l}</button>`).join("")}</div>`:"";
  c.innerHTML=`<button class="btn btn-s" style="margin-bottom:16px" onclick="storageView='list';renderContent()">&larr; All locations</button>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:12px">
      <div><h2 style="margin:0;font-family:Georgia,serif;font-size:20px">${esc(loc.name)}</h2><p style="margin:4px 0 0;font-size:13px;color:#888">${STORAGE_TYPES.find(t=>t.id===loc.storageType)?.label||""} - ${filled}/${total} slots filled${loc.notes?" - "+esc(loc.notes):""}</p></div>
      <div style="display:flex;gap:6px">${viewBtns}<button class="btn btn-s" style="color:var(--danger);border-color:var(--danger);font-size:12px;padding:4px 10px" onclick="delStorage('${loc.id}')">&#128465;</button></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><div class="cap-bar"><div class="cap-fill" style="background:${filled/total>.8?"var(--danger)":"var(--sage)"};width:${Math.round(filled/total*100)}%"></div></div><span style="font-size:12px;color:#888">${filled} / ${total} filled</span></div>
    <div style="display:${storageViewMode==="split"?"grid":"block"};grid-template-columns:1fr 1fr;gap:16px">
      ${storageViewMode==="schematic"||storageViewMode==="split"?`<div style="overflow:auto;border:1px solid #eee;border-radius:10px;background:#FAFAF5;padding:20px"><svg width="${svgW}" height="${svgH}" style="display:block;margin:0 auto">${svgContent}</svg></div>`:""}
      ${(storageViewMode==="photo"||storageViewMode==="split")&&loc.photo?`<div style="border:1px solid #eee;border-radius:10px;overflow:hidden"><img src="${loc.photo}" style="width:100%;display:block"></div>`:storageViewMode==="photo"&&!loc.photo?`<p style="color:#aaa;text-align:center;padding:40px">No reference photo.</p>`:""}
    </div>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:8px;font-size:12px;color:#888"><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--wine);display:inline-block"></span> Wine</span><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--bourbon);display:inline-block"></span> Bourbon</span><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#fff;border:1px solid #ccc;display:inline-block"></span> Empty</span></div>
    <div id="slot-action"></div>`;
}
function handleSlotClick(locId,key){
  const loc=storageLocations.find(l=>l.id===locId);if(!loc)return;
  const bid=(loc.slots||{})[key];const sa=document.getElementById("slot-action");
  if(bid){
    const b=data.find(d=>d.id===bid);if(!b){delete loc.slots[key];save();renderContent();return}
    sa.innerHTML=`<div class="card" style="margin-top:16px"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:600;font-size:15px">${esc(b.name)}</div><div style="font-size:12px;color:#888">${esc(b.producer||b.distillery||"")} ${b.vintage?("- "+b.vintage):""}</div><div style="font-size:12px;color:#888;margin-top:2px">Slot: Row ${parseInt(key.split("-")[0].slice(1))+1}, Col ${parseInt(key.split("-")[1].slice(1))+1}</div></div><button class="btn btn-s" style="color:var(--danger);border-color:var(--danger);font-size:12px" onclick="unassignSlot('${locId}','${key}')">Remove from slot</button></div></div>`;
  }else{
    const unassigned=data.filter(d=>inCol(d)&&!Object.values(loc.slots||{}).includes(d.id));
    sa.innerHTML=`<div class="card" style="margin-top:16px"><h4 style="margin:0 0 8px;font-size:14px">Assign bottle to Row ${parseInt(key.split("-")[0].slice(1))+1}, Col ${parseInt(key.split("-")[1].slice(1))+1}</h4>
      <input class="inp" placeholder="Search bottles..." oninput="filterSlotPicker('${locId}','${key}',this.value)" id="slot-picker-search" style="margin-bottom:8px">
      <div id="slot-picker-list" style="max-height:200px;overflow:auto">${renderSlotPickerList(unassigned,locId,key)}</div>
      <button class="btn btn-s" style="margin-top:8px;font-size:12px" onclick="document.getElementById('slot-action').innerHTML=''">Cancel</button></div>`;
  }
}
function renderSlotPickerList(bottles,locId,key){
  if(!bottles.length)return`<p style="color:#aaa;font-size:13px;text-align:center;padding:12px">No unassigned bottles</p>`;
  return bottles.map(b=>`<div style="padding:8px 10px;border-bottom:1px solid #f5f5f5;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-radius:4px" onclick="assignSlot('${locId}','${key}','${b.id}')" onmouseover="this.style.background='var(--cream)'" onmouseout="this.style.background='transparent'">
    <div><span style="font-weight:600;font-size:13px">${esc(b.name)}</span><span style="font-size:12px;color:#888;margin-left:8px">${esc(b.producer||b.distillery||"")} ${b.vintage?("- "+b.vintage):""}</span></div>
    <span class="badge ${b.category==="wine"?"badge-w":"badge-b"}">${b.category}</span></div>`).join("");
}
function filterSlotPicker(locId,key,q){
  const loc=storageLocations.find(l=>l.id===locId);if(!loc)return;
  const unassigned=data.filter(d=>inCol(d)&&!Object.values(loc.slots||{}).includes(d.id));
  const filtered=q?unassigned.filter(b=>Object.values(b).join(" ").toLowerCase().includes(q.toLowerCase())):unassigned;
  document.getElementById("slot-picker-list").innerHTML=renderSlotPickerList(filtered,locId,key);
}
function assignSlot(locId,key,bid){const loc=storageLocations.find(l=>l.id===locId);if(!loc)return;if(!loc.slots)loc.slots={};loc.slots[key]=bid;save();renderContent()}
function unassignSlot(locId,key){const loc=storageLocations.find(l=>l.id===locId);if(!loc)return;delete loc.slots[key];save();renderContent()}
function delStorage(id){if(confirm("Delete this storage location?")){storageLocations=storageLocations.filter(l=>l.id!==id);if(activeStorageId===id){activeStorageId=null;storageView="list"}save();renderContent()}}

// REPORTS

    <div class="card" style="text-align:center;cursor:pointer" onclick="exportCSV()"><h3 style="margin:8px 0 4px;font-family:Georgia,serif;font-size:15px">Export CSV</h3><p style="font-size:12px;color:#888">Full inventory spreadsheet</p></div>
    <div class="card" style="text-align:center;cursor:pointer" onclick="exportJSON()"><h3 style="margin:8px 0 4px;font-family:Georgia,serif;font-size:15px">Export JSON</h3><p style="font-size:12px;color:#888">Full data backup</p></div>
    <div class="card" style="text-align:center;cursor:pointer" onclick="importJSON()"><h3 style="margin:8px 0 4px;font-family:Georgia,serif;font-size:15px">Restore backup</h3><p style="font-size:12px;color:#888">Import saved JSON</p></div>
    <div class="card" style="text-align:center;cursor:pointer" onclick="showImportModal()"><h3 style="margin:8px 0 4px;font-family:Georgia,serif;font-size:15px">Import spreadsheet</h3><p style="font-size:12px;color:#888">XLSX or CSV bulk import</p></div>

function exportJSON(){const b=new Blob([JSON.stringify({data,settings,storageLocations},null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="cellar_backup.json";a.click();URL.revokeObjectURL(u)}
function importJSON(){const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=async e=>{const t=await e.target.files[0].text();try{const j=JSON.parse(t);if(j.data)data=j.data;if(j.settings)settings=j.settings;if(j.storageLocations)storageLocations=j.storageLocations;save();renderContent();alert("Restored.")}catch{alert("Invalid file.")}};inp.click()}
function exportCSV(){const h=["Category","Name","Producer","Vintage","Detail","Qty","Size","Cost","Value","Rating","Status","Storage","Tags","Notes"];const r=data.map(d=>[d.category,d.name,d.producer||d.distillery||"",d.vintage||"",d.varietal||d.type||"",d.quantity,d.bottleSize||"",d.purchasePrice||"",d.currentValue||"",d.rating||"",d.status,d.storageLocation||"",d.tags||"",d.tastingNotes||""].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(","));const csv=[h.join(","),...r].join("\n");const b=new Blob([csv],{type:"text/csv"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="cellar_export.csv";a.click();URL.revokeObjectURL(u)}

      <div><label class="lbl">Source</label><input class="inp" id="e-source" value="${esc(entry.purchaseSource||"")}"></div>
      <div><label class="lbl">Storage location</label><select class="inp" id="e-storage"><option value="">- None -</option>${locOptions}</select></div>
      ${isW?`<div><label class="lbl">Drink window</label><input class="inp" id="e-window" value="${esc(entry.drinkWindow||"")}"></div>`
      :`<div><label class="lbl">Fill level</label><select class="inp" id="e-fill">${FILL_LEVELS.map(f=>`<option${entry.fillLevel===f?" selected":""}>${f}</option>`).join("")}</select></div>`}
    </div></fieldset>
    <fieldset><legend style="color:var(--sage)">Notes & Rating</legend><div class="g2">
      <div><label class="lbl">Rating (1-100)</label><input class="inp" type="number" min="1" max="100" id="e-rating" value="${entry.rating}"></div>
      <div><label class="lbl">Status *</label><select class="inp" id="e-status">${(isW?WINE_STATUSES:BOURBON_STATUSES).map(s=>`<option${entry.status===s?" selected":""}>${s}</option>`).join("")}</select></div>
      <div><label class="lbl">Tags</label><input class="inp" id="e-tags" value="${esc(entry.tags||"")}" placeholder="comma-separated"></div>
    </div><div style="margin-top:12px"><label class="lbl">Tasting notes</label><textarea class="inp" id="e-notes" style="height:80px">${esc(entry.tastingNotes||"")}</textarea></div></fieldset>
    <div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-s" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="saveEntry()">Save</button></div>`);
}
function switchEntryCategory(cat){
  const id=document.getElementById("e-id").value;
  const base=cat==="wine"?emptyWine():emptyBourbon();base.id=id;
  base.name=document.getElementById("e-name").value;
  showEntryModal(base);
}
function saveEntry(){
  const id=document.getElementById("e-id").value;
  const cat=document.getElementById("e-cat").value;
  const isW=cat==="wine";
  const entry={id,category:cat,name:document.getElementById("e-name").value,quantity:Number(document.getElementById("e-qty").value)||1,bottleSize:document.getElementById("e-size").value,purchasePrice:document.getElementById("e-price").value,currentValue:document.getElementById("e-value").value,purchaseDate:document.getElementById("e-pdate").value,purchaseSource:document.getElementById("e-source").value,storageLocation:document.getElementById("e-storage").value,rating:document.getElementById("e-rating").value,status:document.getElementById("e-status").value,tags:document.getElementById("e-tags").value,tastingNotes:document.getElementById("e-notes").value,dateConsumed:""};
  if(isW){entry.producer=document.getElementById("e-prod").value;entry.vintage=document.getElementById("e-vintage").value;entry.varietal=document.getElementById("e-varietal").value;entry.region=document.getElementById("e-region").value;entry.country=document.getElementById("e-country").value;entry.color=document.getElementById("e-color").value;entry.drinkWindow=document.getElementById("e-window").value}
  else{entry.distillery=document.getElementById("e-prod").value;entry.type=document.getElementById("e-type").value;entry.ageStatement=document.getElementById("e-age").value;entry.proof=document.getElementById("e-proof").value;entry.batchBarrel=document.getElementById("e-batch").value;entry.fillLevel=document.getElementById("e-fill").value}
  if(!entry.name)return alert("Name is required");
  const idx=data.findIndex(d=>d.id===id);
  if(idx>=0)data[idx]=entry;else data.push(entry);
  save();closeModal();renderContent();
}

// IMPORT MODAL
function showImportModal(){
  showModal("Import from spreadsheet",`
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="btn btn-p" id="imp-wine-btn" onclick="setImportCat('wine')">Wine</button>
      <button class="btn btn-s" id="imp-bourbon-btn" onclick="setImportCat('bourbon')">Bourbon</button>
    </div>
    <div class="drop-zone" onclick="document.getElementById('imp-file').click()" ondragover="event.preventDefault()" ondrop="event.preventDefault();handleImportDrop(event)">
      <p style="margin:12px 0 4px;font-weight:600">Drop your spreadsheet here</p><p style="color:#888;font-size:13px">Supports .xlsx, .xls, .csv</p>
      <input type="file" id="imp-file" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleImportFile(this)">
    </div>
    <div style="margin-top:12px;text-align:center">
      <button onclick="downloadTemplate()" style="background:none;border:none;cursor:pointer;color:var(--wine);font-size:13px;font-weight:600;padding:8px 12px;border-radius:6px">&#8595; Download blank template (.xlsx)</button>
      <p style="margin:4px 0 0;font-size:11px;color:#bbb">Pre-formatted with Wine and Bourbon sheets</p>
    </div>
    <div id="imp-preview"></div>`,true);
  window._impCat="wine";window._impHeaders=[];window._impRows=[];window._impMapping={};window._impMode="add";
}
function setImportCat(cat){window._impCat=cat;document.getElementById("imp-wine-btn").className="btn "+(cat==="wine"?"btn-p":"btn-s");document.getElementById("imp-bourbon-btn").className="btn "+(cat==="bourbon"?"btn-g":"btn-s")}
function handleImportDrop(e){const f=e.dataTransfer.files[0];if(f)handleImportFile({files:[f]})}
async function handleImportFile(inp){
  const file=inp.files[0];if(!file)return;
  const ext=file.name.split(".").pop().toLowerCase();
  if(ext==="csv"){const text=await file.text();const lines=text.split("\n").map(l=>l.split(",").map(c=>c.replace(/^"|"$/g,"").trim()));window._impHeaders=lines[0]||[];window._impRows=lines.slice(1).filter(r=>r.some(c=>c))}
  else{const ab=await file.arrayBuffer();if(XLSX){const wb=XLSX.read(ab);const ws=wb.Sheets[wb.SheetNames[0]];const json=XLSX.utils.sheet_to_json(ws,{header:1});window._impHeaders=(json[0]||[]).map(String);window._impRows=json.slice(1).filter(r=>r.some(c=>c!=null&&c!==""))}else{alert("XLSX library not loaded.");return}}
  window._impMapping=fuzzyMap(window._impHeaders,window._impCat==="wine"?HEADER_MAP_WINE:HEADER_MAP_BOURBON);
  renderImportPreview();
}
function renderImportPreview(){
  const h=window._impHeaders,r=window._impRows,m=window._impMapping;
  const allFields=Object.keys(window._impCat==="wine"?HEADER_MAP_WINE:HEADER_MAP_BOURBON);
  const preview=document.getElementById("imp-preview");
  preview.innerHTML=`<h3 style="font-size:15px;margin:16px 0 8px">Map columns - ${window._impCat}</h3><p style="font-size:13px;color:#888;margin-bottom:12px">${r.length} rows found.</p>
    <div style="max-height:300px;overflow:auto;border:1px solid #eee;border-radius:8px"><table><thead><tr style="background:var(--cream)">${h.map((hd,i)=>`<th style="font-weight:600"><div>${esc(hd)}</div><select onchange="window._impMapping[${i}]=this.value||undefined;if(!this.value)delete window._impMapping[${i}]" style="margin-top:4px;font-size:12px;padding:2px 4px;width:100%;border:1px solid #ccc;border-radius:4px;background:${m[i]?"#e8f5e9":"#fff3e0"}"><option value="">- skip -</option>${allFields.map(f=>`<option value="${f}"${m[i]===f?" selected":""}>${f}</option>`).join("")}</select></th>`).join("")}</tr></thead>
    <tbody>${r.slice(0,5).map(row=>`<tr>${h.map((_,ci)=>`<td style="color:#555">${row[ci]!=null?esc(String(row[ci])):""}</td>`).join("")}</tr>`).join("")}</tbody></table></div>
    <div style="margin-top:16px"><label style="font-size:13px;font-weight:600;color:#555">Import mode</label>
    <div style="display:flex;gap:8px;margin-top:6px">${[["add","Add to collection"],["merge","Merge / update"],["replace","Replace all"]].map(([v,l])=>`<button class="btn ${window._impMode===v?"btn-p":"btn-s"}" onclick="window._impMode='${v}';renderImportPreview()" style="font-size:12px">${l}</button>`).join("")}</div></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px"><button class="btn btn-p" onclick="doImport()">Import ${r.length} bottles</button></div>`;
}
function doImport(){
  const entries=window._impRows.map(row=>{
    const base=window._impCat==="wine"?emptyWine():emptyBourbon();
    Object.entries(window._impMapping).forEach(([ci,field])=>{const v=row[Number(ci)];if(v!=null&&v!=="")base[field]=String(v)});
    if(base.quantity)base.quantity=Number(base.quantity)||1;
    if(base.purchasePrice)base.purchasePrice=String(parseFloat(String(base.purchasePrice).replace(/[$,]/g,""))||"");
    if(base.currentValue)base.currentValue=String(parseFloat(String(base.currentValue).replace(/[$,]/g,""))||"");
    return base;
  }).filter(e=>e.name);
  if(window._impMode==="replace")data=entries;
  else if(window._impMode==="merge"){entries.forEach(e=>{const x=data.find(d=>d.name===e.name&&d.category===e.category&&(e.category==="wine"?d.vintage===e.vintage:d.batchBarrel===e.batchBarrel));if(x)Object.assign(x,e,{id:x.id});else data.push(e)})}
  else data=data.concat(entries);
  save();closeModal();renderContent();alert("Imported "+entries.length+" bottles.");
}
function downloadTemplate(){
  const wH=["Name","Winery","Vintage","Varietal","Region","Country","Color","Quantity","Bottle Size","Purchase Price","Current Value","Purchase Date","Source","Storage Location","Drink Window","Rating","Tasting Notes","Tags","Status"];
  const wE=["Caymus Cabernet Sauvignon","Caymus Vineyards","2021","Cabernet Sauvignon","Napa Valley","USA","Red","2","750ml","89.99","120.00","2023-06-15","Total Wine","Wine Fridge - Shelf 2","2024-2030","92","Rich dark fruit, smooth tannins","investment, dinner party","In Collection"];
  const bH=["Name","Distillery","Type","Age Statement","Proof","Batch / Barrel","Quantity","Bottle Size","Purchase Price","Current Value","Purchase Date","Source","Storage Location","Fill Level","Rating","Tasting Notes","Tags","Status"];
  const bE=["Blanton's Single Barrel","Buffalo Trace","Bourbon","NAS","93","Barrel 142","1","750ml","64.99","150.00","2023-09-01","Liquor Store","Bar Shelf","Full (Sealed)","90","Caramel, vanilla, hint of citrus","allocated, special occasion","In Collection"];
  const wb=XLSX.utils.book_new();const ws1=XLSX.utils.aoa_to_sheet([wH,wE]);const ws2=XLSX.utils.aoa_to_sheet([bH,bE]);
  ws1["!cols"]=Array(20).fill({wch:18});ws2["!cols"]=Array(20).fill({wch:18});
  XLSX.utils.book_append_sheet(wb,ws1,"Wine");XLSX.utils.book_append_sheet(wb,ws2,"Bourbon");
  XLSX.writeFile(wb,"Cellar_Import_Template.xlsx");
}

  showModal("Add storage location",`

      <div><label class="lbl">Type *</label><select class="inp" id="sl-type" onchange="updateStorageDefaults()">${STORAGE_TYPES.map(t=>`<option value="${t.id}">${t.label}</option>`).join("")}</select></div>
      <div><label class="lbl">Rows</label><input class="inp" type="number" min="1" max="20" id="sl-rows" value="6"></div>
      <div><label class="lbl">Columns</label><input class="inp" type="number" min="1" max="20" id="sl-cols" value="4"></div>
    </div>
    <div style="margin-top:12px"><label class="lbl">Notes</label><input class="inp" id="sl-notes" placeholder="e.g. Set to 55F, top shelf bourbon only"></div>
    <div style="margin-top:16px;border:1px solid #eee;border-radius:10px;padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <label class="lbl" style="margin:0">Reference photo</label>
        <button class="btn btn-g" id="sl-ai-btn" onclick="analyzeStoragePhoto()" style="font-size:12px;display:none">&#9889; AI analyze grid</button>
      </div>
      <div id="sl-photo-area">
        <div class="drop-zone" onclick="document.getElementById('sl-photo').click()" style="padding:30px">
          <p style="margin:8px 0 0;font-size:13px;color:#888">Upload a photo of your storage</p>
          <p style="margin:4px 0 0;font-size:11px;color:#bbb">AI will analyze it to auto-configure the grid</p>
          <input type="file" id="sl-photo" accept="image/*" capture="environment" style="display:none" onchange="handleStoragePhoto(this)">
        </div>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px"><button class="btn btn-s" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="saveStorageLocation()">Save location</button></div>`,true);
  window._slPhoto=null;
}
function updateStorageDefaults(){const t=STORAGE_TYPES.find(s=>s.id===document.getElementById("sl-type").value);if(t){document.getElementById("sl-rows").value=t.rows;document.getElementById("sl-cols").value=t.cols}}
function handleStoragePhoto(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();reader.onload=ev=>{
    const img=new Image();img.onload=()=>{
      const canvas=document.createElement("canvas");const maxW=800;const scale=img.width>maxW?maxW/img.width:1;
      canvas.width=img.width*scale;canvas.height=img.height*scale;
      canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
      window._slPhoto=canvas.toDataURL("image/jpeg",0.7);
      document.getElementById("sl-photo-area").innerHTML=`<div style="position:relative"><img src="${window._slPhoto}" style="width:100%;max-height:250px;object-fit:contain;border-radius:8px;border:1px solid #eee"><button onclick="window._slPhoto=null;document.getElementById('sl-photo-area').innerHTML='<div class=\\'drop-zone\\' onclick=\\'document.getElementById(\"sl-photo\").click()\\'' style='padding:30px'><p style=\\'margin:8px 0 0;font-size:13px;color:#888\\'>Upload a photo</p><input type=\\'file\\' id=\\'sl-photo\\' accept=\\'image/*\\' style=\\'display:none\\' onchange=\\'handleStoragePhoto(this)\\'></div>';document.getElementById('sl-ai-btn').style.display='none'" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px">&times;</button></div>`;
      document.getElementById("sl-ai-btn").style.display="inline-flex";
    };img.src=ev.target.result;
  };reader.readAsDataURL(file);
}
async function analyzeStoragePhoto(){
  if(!window._slPhoto)return;
  const apiKey=settings.apiKey;
  if(!apiKey){alert("Add your Anthropic API key in Settings to use AI analysis. You can set the grid manually instead.");return}
  const btn=document.getElementById("sl-ai-btn");btn.textContent="Analyzing...";btn.disabled=true;
  try{
    const typeLabel=STORAGE_TYPES.find(t=>t.id===document.getElementById("sl-type").value)?.label||"storage";
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:window._slPhoto.split(",")[1]}},
        {type:"text",text:`Analyze this photo of a ${typeLabel} for storing wine/bourbon. Return ONLY valid JSON: {"rows":<number>,"columns":<number>,"estimatedCapacity":<number>,"description":"<one sentence>"}`}
      ]}]})
    });
    const d=await resp.json();const text=d.content?.map(c=>c.text||"").join("")||"";
    const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
    document.getElementById("sl-rows").value=parsed.rows||6;
    document.getElementById("sl-cols").value=parsed.columns||4;
    alert("AI analysis: "+parsed.description+"\nGrid updated to "+parsed.rows+" x "+parsed.columns+" ("+parsed.estimatedCapacity+" capacity).");
  }catch(err){console.error(err);alert("AI analysis could not complete. Set grid dimensions manually.")}
  btn.textContent="⚡ AI analyze grid";btn.disabled=false;
}
function saveStorageLocation(){
  const name=document.getElementById("sl-name").value;if(!name)return alert("Name is required");
  storageLocations.push({id:uid(),name,storageType:document.getElementById("sl-type").value,rows:Number(document.getElementById("sl-rows").value)||4,cols:Number(document.getElementById("sl-cols").value)||4,notes:document.getElementById("sl-notes").value,photo:window._slPhoto,slots:{}});
  save();closeModal();renderContent();
}

      <div style="font-family:Georgia,serif;font-size:15px;font-weight:600">Install The Cellar</div>

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();

});

document.getElementById('pwa-install').addEventListener('click', async () => {
  if (!deferredPrompt) return;
